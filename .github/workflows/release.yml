name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            args: ""
          - label: macos-arm64
            os: macos-15
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - label: macos-x64
            os: macos-15-intel
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust with macOS target
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: choco install wixtoolset --yes --no-progress

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseBody: "See the assets below to download and install aiooiv."
          releaseDraft: true
          prerelease: false
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
