name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Create or reuse draft release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            core.setOutput("release_tag", tag);
            await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`,
            });

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.find((release) => release.tag_name === tag);

            if (existing) {
              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                per_page: 100,
              });

              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                name: tag,
                body: "See the assets below to download and install aiooiv.",
                draft: true,
                prerelease: false,
              });
              core.setOutput("release_id", existing.id);
              return;
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: "See the assets below to download and install aiooiv.",
              draft: true,
              prerelease: false,
            });
            core.setOutput("release_id", release.id);

  build-release:
    name: Build release (${{ matrix.label }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            args: ""
          - label: macos-arm64
            os: macos-15
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - label: macos-x64
            os: macos-15-intel
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust with macOS target
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: choco install wixtoolset --yes --no-progress

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: bun run tauri
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub release
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number("${{ needs.create-release.outputs.release_id }}"),
              draft: false,
              prerelease: false,
            });
