name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.0.2-rc.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Create or reuse draft release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const prerelease = tag.includes("-");
            core.setOutput("release_tag", tag);
            core.setOutput("prerelease", String(prerelease));
            await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`,
            });

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.find((release) => release.tag_name === tag);

            if (existing) {
              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                per_page: 100,
              });

              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                name: tag,
                body: prerelease
                  ? "This is a prerelease build of aiooiv for testing. See the assets below to download it."
                  : "See the assets below to download and install aiooiv.",
                draft: true,
                prerelease,
              });
              core.setOutput("release_id", existing.id);
              return;
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: prerelease
                ? "This is a prerelease build of aiooiv for testing. See the assets below to download it."
                : "See the assets below to download and install aiooiv.",
              draft: true,
              prerelease,
            });
            core.setOutput("release_id", release.id);

  build-release:
    name: Build release (${{ matrix.label }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            args: ""
            prerelease_args: "--bundles nsis"
          - label: macos-arm64
            os: macos-15
            args: "--target aarch64-apple-darwin"
            prerelease_args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - label: macos-x64
            os: macos-15-intel
            args: "--target x86_64-apple-darwin"
            prerelease_args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust with macOS target
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install WiX Toolset
        if: runner.os == 'Windows' && needs.create-release.outputs.prerelease != 'true'
        run: choco install wixtoolset --yes --no-progress

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: bun run tauri
          args: ${{ needs.create-release.outputs.prerelease == 'true' && matrix.prerelease_args || matrix.args }}

      - name: Package Windows portable zip
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $portableDir = "artifacts/aiooiv-portable"
          $zipPath = "artifacts/aiooiv-${env:RELEASE_TAG}-windows-x64-portable.zip"

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          $exePath = Join-Path $releaseDir "aiooiv.exe"
          if (!(Test-Path $exePath)) {
            throw "Portable executable not found: $exePath"
          }
          Copy-Item $exePath (Join-Path $portableDir "aiooiv.exe") -Force

          $webViewLoader = Get-ChildItem "src-tauri/target" -Recurse -Filter "WebView2Loader.dll" -File | Select-Object -First 1
          if ($webViewLoader) {
            Copy-Item $webViewLoader.FullName (Join-Path $portableDir "WebView2Loader.dll") -Force
            Write-Host "Included WebView2Loader.dll from: $($webViewLoader.FullName)"
          } else {
            Write-Warning "WebView2Loader.dll was not found in the Tauri target directory; packaging aiooiv.exe only. Windows still needs Microsoft Edge WebView2 Runtime installed."
          }

          @"
          aiooiv 绿色免安装版

          使用方法：解压后直接运行 aiooiv.exe。
          说明：本版本无需安装 aiooiv；Windows 仍需要可用的 Microsoft Edge WebView2 Runtime。
          "@ | Set-Content -Path (Join-Path $portableDir "README-portable.txt") -Encoding UTF8

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $zipPath
          Write-Host "Created portable zip: $zipPath"

      - name: Upload Windows portable zip
        if: matrix.label == 'windows-x64'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload $env:RELEASE_TAG "artifacts/aiooiv-${env:RELEASE_TAG}-windows-x64-portable.zip" --clobber

  publish-release:
    name: Publish GitHub release
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const prerelease = "${{ needs.create-release.outputs.prerelease }}" === "true";
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number("${{ needs.create-release.outputs.release_id }}"),
              draft: false,
              prerelease,
            });
